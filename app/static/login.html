<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaioWoot - Login</title>
<meta name="theme-color" content="#ffffff">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100dvh; display: flex; align-items: center; justify-content: center; background: #f5f5f5; }
.login-box { background: #fff; border-radius: 12px; padding: 32px; width: 90%; max-width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.login-box h1 { font-size: 20px; margin-bottom: 24px; text-align: center; }
.login-box input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; margin-bottom: 12px; }
.login-box input:focus { outline: none; border-color: #25D366; }
.login-box button { width: 100%; padding: 12px; background: #25D366; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.login-box button:hover { background: #1da851; }
.login-box button:disabled { background: #ccc; cursor: not-allowed; }
.error { color: #c62828; font-size: 13px; text-align: center; margin-bottom: 12px; display: none; }
</style>
</head>
<body>
<div class="login-box">
  <h1>CaioWoot</h1>
  <div class="error" id="error-msg"></div>
  <form id="login-form">
    <input type="password" id="password" placeholder="Senha" autofocus>
    <button type="submit" id="login-btn">Entrar</button>
  </form>
</div>
<script>
document.getElementById("login-form").onsubmit = async (e) => {
  e.preventDefault();
  const pw = document.getElementById("password").value;
  const btn = document.getElementById("login-btn");
  const err = document.getElementById("error-msg");
  err.style.display = "none";
  btn.disabled = true;
  btn.textContent = "Entrando...";

  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw }),
    });

    if (res.ok) {
      window.location.href = "/";
    } else {
      const data = await res.json();
      err.textContent = data.detail || "Erro ao fazer login";
      err.style.display = "block";
    }
  } catch (ex) {
    err.textContent = "Erro de conexão";
    err.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.textContent = "Entrar";
  }
};
</script>
</body>
</html>
