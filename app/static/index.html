<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaioWoot</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; background: #f5f5f5; }

/* Sidebar */
#sidebar { width: 320px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
#sidebar-header { padding: 16px; border-bottom: 1px solid #ddd; font-size: 18px; font-weight: 600; }
#conversation-list { flex: 1; overflow-y: auto; }
.conv-item { padding: 12px 16px; border-bottom: 1px solid #eee; cursor: pointer; }
.conv-item:hover { background: #f0f0f0; }
.conv-item.active { background: #e3f2fd; }
.conv-item.unread { border-left: 3px solid #2196F3; }
.conv-name { font-weight: 600; font-size: 14px; }
.conv-preview { font-size: 13px; color: #666; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-time { font-size: 11px; color: #999; float: right; }

/* Main area */
#main { flex: 1; display: flex; flex-direction: column; }
#main-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #999; font-size: 16px; }
#chat-header { padding: 16px; border-bottom: 1px solid #ddd; background: #fff; font-weight: 600; display: none; }
#messages { flex: 1; overflow-y: auto; padding: 16px; display: none; }
.msg { max-width: 70%; padding: 10px 14px; border-radius: 12px; margin-bottom: 8px; font-size: 14px; line-height: 1.4; word-wrap: break-word; white-space: pre-wrap; }
.msg.inbound { background: #fff; border: 1px solid #ddd; align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.outbound { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 4px; margin-left: auto; }

/* Compose area */
#compose { padding: 12px 16px; border-top: 1px solid #ddd; background: #fff; display: none; }

/* Draft variations */
#draft-cards { display: flex; gap: 8px; margin-bottom: 8px; }
.draft-card { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 13px; background: #fafafa; cursor: pointer; position: relative; max-height: 120px; overflow-y: auto; line-height: 1.4; }
.draft-card:hover { border-color: #999; }
.draft-card.selected { border-color: #25D366; background: #f0faf0; }
.draft-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.draft-card-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; }
.draft-card-actions { display: flex; gap: 4px; }
.draft-card-actions button { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px; }
.draft-card-actions button:hover { background: #eee; }
.draft-card-text { font-size: 13px; color: #333; white-space: pre-wrap; }
#regen-all-btn { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 12px; white-space: nowrap; align-self: center; }
#regen-all-btn:hover { background: #f0f0f0; }
#draft-cards-container { display: none; }

/* Instruction bar */
#instruction-bar { display: none; margin-bottom: 8px; display: none; }
#instruction-bar .instruction-row { display: flex; gap: 8px; align-items: center; }
#instruction-input { flex: 1; padding: 8px 12px; border: 1px dashed #ccc; border-radius: 6px; font-size: 13px; font-family: inherit; background: #fffef5; }
#instruction-input::placeholder { color: #bbb; }
#regen-instruction-btn { padding: 8px 14px; background: #fff; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap; color: #555; }
#regen-instruction-btn:hover { background: #f0f0f0; border-color: #999; }

/* Justification */
#justification { font-size: 12px; color: #888; padding: 8px 12px; background: #f9f9f9; border-radius: 6px; margin-bottom: 8px; font-style: italic; display: none; }

/* Draft area */
#draft-area { display: flex; gap: 8px; align-items: flex-end; }
#draft-input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 120px; max-height: 300px; }

/* Attachment */
#attachment-bar { display: none; margin-bottom: 8px; padding: 6px 10px; background: #f0f0f0; border-radius: 6px; font-size: 13px; }
#attachment-bar span { margin-right: 8px; }
#attachment-remove { background: none; border: none; cursor: pointer; color: #c00; font-weight: 600; }

#btn-group { display: flex; flex-direction: column; gap: 4px; }
#send-btn { padding: 10px 20px; background: #25D366; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
#send-btn:hover { background: #1da851; }
#send-btn:disabled { background: #ccc; cursor: not-allowed; }
#attach-btn { padding: 8px 12px; background: #fff; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; cursor: pointer; }
#attach-btn:hover { background: #f0f0f0; }
#attach-file { display: none; }
</style>
</head>
<body>
<div id="sidebar">
  <div id="sidebar-header">CaioWoot</div>
  <div id="conversation-list"></div>
</div>
<div id="main">
  <div id="main-empty">Selecione uma conversa</div>
  <div id="chat-header"></div>
  <div id="messages"></div>
  <div id="compose">
    <div id="draft-cards-container">
      <div style="display:flex; gap:8px; align-items:stretch;">
        <div id="draft-cards"></div>
        <button id="regen-all-btn" title="Regenerar todas">&#x1F504; Todas</button>
      </div>
    </div>
    <div id="instruction-bar">
      <div class="instruction-row">
        <input id="instruction-input" type="text" placeholder="Instrução para a IA (ex: foca no preço, ela é técnica...)">
        <button id="regen-instruction-btn" title="Regenerar todas com esta instrução">&#x1F504; Regenerar</button>
      </div>
    </div>
    <div id="justification"></div>
    <div id="attachment-bar">
      <span id="attachment-name"></span>
      <button id="attachment-remove">&times;</button>
    </div>
    <div id="draft-area">
      <textarea id="draft-input" placeholder="Digite sua mensagem..."></textarea>
      <div id="btn-group">
        <button id="send-btn">Enviar</button>
        <button id="attach-btn" title="Anexar arquivo">&#x1F4CE;</button>
        <input type="file" id="attach-file">
      </div>
    </div>
  </div>
</div>
<script src="app.js?v=4"></script>
</body>
</html>
